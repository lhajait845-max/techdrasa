<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDrasa AI - منصة مساعدة تلاميذ الباكالوريا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { cairo: ['Cairo', 'sans-serif'] },
                    colors: {
                        royal: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' },
                        purple: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7e22ce', 800: '#6b21a8', 900: '#581c87' },
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'typing': 'typing 1.4s infinite',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-20px)' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                    }
                }
            }
        };
    </script>
    
    <script>
        // منع الكليك باليمن
        document.addEventListener('contextmenu', event => event.preventDefault());

        // منع أزرار الكيبورد الخاصة بالفحص
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; // F12
            if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false; // Ctrl+Shift+I
            if (e.ctrlKey && e.shiftKey && e.keyCode == 74) return false; // Ctrl+Shift+J
            if (e.ctrlKey && e.keyCode == 85) return false; // Ctrl+U (View Source)
        };
    </script>

    <style>
        body { font-family: 'Cairo', sans-serif; user-select: none; -webkit-user-select: none; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .glass-dark { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-text { background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .gradient-bg { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #581c87 100%); }
        .chat-bubble-user { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .chat-bubble-bot { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); }
        .dark .chat-bubble-bot { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .subject-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .subject-card:hover { transform: translateY(-8px) scale(1.02); }
        .typing-dot { animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-500">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const mockResponses = {
            math: [
                "صافي خويا، هاد السؤال فالرياضيات خاصو شوية التركيز. خاصك تعرف بلي la fonction ln(x) كاتكون معرفة غير ل x > 0، و derivative ديالها هي 1/x. بلا ما تنسا هاد القاعدة فالامتحان!",
                "هاد التمرين كايبان صعيب ولكن ساهل بزاف! خاصك تطبق la règle de dérivation: (u/v)' = (u'v - uv')/v². جرب تراجع التمارين ديال les dérivées ديال les fonctions rationnelles.",
                "بالنسبة للمعادلات التفاضلية ديال type y' + ay = b، الحل العام كايكون y = Ce^(-ax) + b/a. هادي قاعدة أساسية فالباك PC، خاصك تحفظها مليح!",
                "هاد السؤال كيتعلق بـ les suites numériques. خاصك تفهم الفرق بين suite arithmétique (u_n = u_0 + nr) و suite géométrique (u_n = u_0 * q^n). جرب تحسب limit ديال كل وحدة!"
            ],
            physics: [
                "صافي خويا، فالفيزياء هاد السؤال كايتعلق بـ la cinématique. تذكر bli v = v_0 + at و x = v_0t + ½at². هادو les équations horaires ديال mouvement rectiligne uniformément varié (MRUV).",
                "هاد التمرين كيتعلق بـ les forces. خاصك تطبق le principe fondamental de la dynamique: ΣF = ma. حاول ترسم le bilan des forces و تحلّلهم على les axes!",
                "بالنسبة للطاقة، تذكر bli l'énergie cinétique E_c = ½mv² و l'énergie potentielle de pesanteur E_pp = mgh. le théorème de l'énergie cinétique كايقول bli ΔE_c = W(ΣF_ext)."
            ],
            philosophy: [
                "هاد السؤال الفلسفي عميق بزاف خويا. خاصك تبدأ بـ la définition du concept: الوعي هو la conscience de soi و la conscience du monde. كايمكن نعتبرو la condition de possibilité ديال toute connaissance.",
                "فالفلسفة، هاد الموضوع كايتعلق بـ la liberté. خاصك تناقش بين la liberté comme autonomية (Kant) و la liberté comme puissance (Spinoza). واش الإنسان حر فعلاً ولا مكبل بالضرورة؟"
            ]
        };

        const subjects = [
            { id: 'math', name: 'الرياضيات', nameFr: 'Mathématiques', icon: 'Calculator', color: 'from-blue-500 to-indigo-600', bgColor: 'bg-blue-500/10', borderColor: 'border-blue-500/30', description: 'الدوال، التفاضل، التكامل، المتتاليات، الإحصاء' },
            { id: 'physics', name: 'الفيزياء', nameFr: 'Physique-Chimie', icon: 'Atom', color: 'from-purple-500 to-violet-600', bgColor: 'bg-purple-500/10', borderColor: 'border-purple-500/30', description: 'الميكانيك، الكهرباء، المغناطيسية، الديناميكا' },
            { id: 'philosophy', name: 'الفلسفة', nameFr: 'Philosophie', icon: 'Brain', color: 'from-rose-500 to-pink-600', bgColor: 'bg-rose-500/10', borderColor: 'border-rose-500/30', description: 'الوجود، الوعي، الحرية، الدولة، العلم، الفن' }
        ];

        const Icons = {
            Calculator: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('rect', { width: '16', height: '20', x: '4', y: '2', rx: '2' }), React.createElement('line', { x1: '8', x2: '16', y1: '6', y2: '6' })),
            Atom: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('circle', { cx: '12', cy: '12', r: '1' }), React.createElement('path', { d: 'M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9' })),
            Brain: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('path', { d: 'M12 5a3 3 0 1 0-5.997.125' })),
            Moon: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('path', { d: 'M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z' })),
            Sun: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('circle', { cx: '12', cy: '12', r: '4' })),
            Send: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('path', { d: 'm22 2-7 20-4-9-9-4Z' })),
            Bot: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('rect', { width: '16', height: '12', x: '4', y: '8', rx: '2' })),
            User: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('circle', { cx: '12', cy: '7', r: '4' })),
            Sparkles: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('path', { d: 'm12 3-1.912 5.813' })),
            GraduationCap: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('path', { d: 'M22 10v6' })),
            BookOpen: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('path', { d: 'M2 3h6a4 4 0 0 1 4 4v14' })),
            MessageCircle: () => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2' }, React.createElement('path', { d: 'M7.9 20A9 9 0 1 0 4 16.1L2 22Z' }))
        };

        function Navbar({ darkMode, toggleDarkMode }) {
            return React.createElement('nav', { className: 'fixed top-0 left-0 right-0 z-50 glass dark:glass-dark border-b border-white/10' },
                React.createElement('div', { className: 'max-w-7xl mx-auto px-4 h-16 flex items-center justify-between' },
                    React.createElement('div', { className: 'flex items-center gap-3' },
                        React.createElement('div', { className: 'w-10 h-10 rounded-xl bg-gradient-to-br from-royal-500 to-purple-600 flex items-center justify-center' }, React.createElement(Icons.Sparkles, { className: 'w-5 h-5 text-white' })),
                        React.createElement('span', { className: 'text-xl font-bold gradient-text' }, 'TechDrasa AI')
                    ),
                    React.createElement('button', { onClick: toggleDarkMode, className: 'p-2.5 rounded-xl bg-white/10 dark:bg-slate-800 border border-white/20' }, darkMode ? React.createElement(Icons.Sun, { className: 'w-5 h-5 text-amber-400' }) : React.createElement(Icons.Moon, { className: 'w-5 h-5 text-slate-600' }))
                )
            );
        }

        function HeroSection() {
            return React.createElement('section', { className: 'relative pt-32 pb-20 overflow-hidden text-center' },
                React.createElement('div', { className: 'absolute inset-0 gradient-bg -z-10' }),
                React.createElement('div', { className: 'max-w-7xl mx-auto px-4' },
                    React.createElement('h1', { className: 'text-4xl sm:text-6xl font-black text-white mb-6' }, 'جهز راسك للباك مع الذكاء الاصطناعي'),
                    React.createElement('p', { className: 'text-lg text-white/70 max-w-2xl mx-auto mb-6' }, 'منصة مساعدة تلاميذ الباكالوريا المغربية - مسلك علوم فيزيائية خيار فرنسي.'),
                    React.createElement('div', { className: 'inline-flex items-center gap-2 px-4 py-2 rounded-full glass border border-white/20 text-white' }, React.createElement(Icons.GraduationCap, { className: 'w-4 h-4' }), 'الامتحان الوطني: يونيو 2026')
                )
            );
        }

        function ChatSection({ activeSubject }) {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);

            useEffect(() => {
                setMessages([{ role: 'assistant', content: `مرحبا بك! 🎓 أنا المساعد الذكي الخاص بمادة ${activeSubject.name}. سولني أي حاجة وغادي نجاوبك بالدارجة والمصطلحات الفرنسية!` }]);
            }, [activeSubject]);

            const handleSend = () => {
                if (!input.trim() || isTyping) return;
                const txt = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: txt }]);
                setIsTyping(true);

                setTimeout(() => {
                    const res = mockResponses[activeSubject.id];
                    const rand = res[Math.floor(Math.random() * res.length)] || "سؤال زوين! جرب تسولني كثر ف هاد المادة.";
                    setMessages(prev => [...prev, { role: 'assistant', content: rand }]);
                    setIsTyping(false);
                }, 1200);
            };

            return React.createElement('section', { className: 'py-12 max-w-4xl mx-auto px-4' },
                React.createElement('div', { className: 'rounded-3xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-xl overflow-hidden' },
                    React.createElement('div', { className: 'h-[400px] overflow-y-auto p-4 space-y-4 scrollbar-hide' },
                        messages.map((msg, i) => React.createElement('div', { key: i, className: `flex ${msg.role === 'user' ? 'justify-start' : 'justify-end'}` },
                            React.createElement('div', { className: `p-3 rounded-2xl max-w-[80%] text-sm ${msg.role === 'user' ? 'chat-bubble-user text-white' : 'chat-bubble-bot text-slate-800 dark:text-slate-200'}` }, msg.content)
                        )),
                        isTyping && React.createElement('div', { className: 'text-xs text-slate-400' }, 'يكتب الآن...')
                    ),
                    React.createElement('div', { className: 'p-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 flex gap-3' },
                        React.createElement('input', { value: input, onChange: e => setInput(e.target.value), onKeyPress: e => e.key === 'Enter' && handleSend(), placeholder: 'اكتب سؤالك هنا...', className: 'flex-1 px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-royal-500' }),
                        React.createElement('button', { onClick: handleSend, className: 'px-4 py-2 rounded-xl bg-royal-600 text-white font-bold' }, React.createElement(Icons.Send, { className: 'w-4 h-4' }))
                    )
                )
            );
        }

        function SubjectsSection({ activeSubject, setActiveSubject }) {
            return React.createElement('section', { className: 'py-12 max-w-4xl mx-auto px-4' },
                React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4' },
                    subjects.map(s => React.createElement('button', { key: s.id, onClick: () => setActiveSubject(s), className: `p-6 rounded-2xl border text-right transition-all ${activeSubject.id === s.id ? 'border-royal-500 bg-royal-500/10 ring-2 ring-royal-500' : 'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800'}` },
                        React.createElement('h3', { className: 'text-lg font-bold text-slate-900 dark:text-white' }, s.name),
                        React.createElement('p', { className: 'text-xs text-slate-400 mb-2' }, s.nameFr),
                        React.createElement('p', { className: 'text-xs text-slate-500' }, s.description)
                    ))
                )
            );
        }

        function App() {
            const [darkMode, setDarkMode] = useState(false);
            const [activeSubject, setActiveSubject] = useState(subjects[0]);

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            return React.createElement('div', { className: 'min-h-screen bg-slate-50 dark:bg-slate-900 transition-colors duration-300' },
                React.createElement(Navbar, { darkMode, toggleDarkMode: () => setDarkMode(!darkMode) }),
                React.createElement(HeroSection, null),
                React.createElement(SubjectsSection, { activeSubject, setActiveSubject }),
                React.createElement(ChatSection, { activeSubject })
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
